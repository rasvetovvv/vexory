services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vexory
      POSTGRES_PASSWORD: vexory_dev
      POSTGRES_DB: vexory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
